cv:
  name: Fietyata Yudha
  label: "Ph.D. in AI for Cybersecurity | Assistant Professor, Universitas Islam Indonesia"
  email: yudha@uii.ac.id
  location: Sleman, Yogyakarta, Indonesia
  image: ""
  summary: >
    Fietyata Yudha received the Ph.D. degree from the EECS International Graduate Program,
    National Yang Ming Chiao Tung University (NYCU), Taiwan, in 2025, and the M.S. degree
    in Digital Forensics from Universitas Islam Indonesia (UII), Indonesia, in 2013.
    He is currently an Assistant Professor with the Department of Informatics, UII, and
    a member of the Center for Digital Forensic Studies. His research interests include
    AI for cybersecurity, network security, ethical hacking, and digital forensics.

